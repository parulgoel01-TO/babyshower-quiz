<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Speed Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1rem; }
  .app { width: 100%; max-width: 520px; padding-bottom: 2rem; }
  .screen { display: none; }
  .screen.active { display: block; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 1rem; }
  h3 { font-size: 16px; font-weight: 600; margin-bottom: 0.75rem; }
  p { color: #555; font-size: 14px; line-height: 1.6; }
  .logo { text-align: center; padding: 2rem 0 1.5rem; }
  .logo .icon { font-size: 48px; }
  .logo h1 { font-size: 28px; }
  .logo p { margin-top: 4px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e5e5e0; padding: 1.25rem; margin-bottom: 12px; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; background: #fff; color: #1a1a1a; margin-bottom: 10px;
    font-family: inherit; outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: #555; }
  .btn { width: 100%; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-bottom: 8px; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: #fff; color: #1a1a1a; border: 1px solid #ddd; }
  .btn-secondary:hover { background: #f5f5f0; }
  .btn-danger { background: #fff; color: #c0392b; border: 1px solid #f5c6c6; }
  .room-code { font-size: 38px; font-weight: 700; letter-spacing: 8px; text-align: center; padding: 1.25rem; background: #f5f5f0; border-radius: 10px; margin: 12px 0; color: #1a1a1a; }
  .player-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; min-height: 36px; }
  .player-chip { background: #eaf3de; border: 1px solid #c0dd97; border-radius: 20px; padding: 5px 14px; font-size: 13px; color: #27500a; font-weight: 500; }
  .player-chip.host::after { content: ' 👑'; }
  .timer-wrap { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .timer-bar { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .timer-fill { height: 100%; background: #185fa5; border-radius: 4px; transition: width 0.1s linear, background 0.3s; }
  .timer-fill.warn { background: #ba7517; }
  .timer-fill.danger { background: #a32d2d; }
  .timer-num { font-size: 22px; font-weight: 700; min-width: 32px; text-align: right; color: #1a1a1a; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .q-num { font-size: 13px; color: #888; }
  .q-text { font-size: 17px; font-weight: 600; line-height: 1.5; margin: 10px 0 16px; color: #1a1a1a; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt { background: #fff; border: 1.5px solid #ddd; border-radius: 10px; padding: 14px 12px; font-size: 14px; color: #1a1a1a; cursor: pointer; text-align: left; transition: background 0.15s, border-color 0.15s; font-family: inherit; }
  .opt:hover:not(:disabled) { background: #f5f5f0; border-color: #aaa; }
  .opt.correct { background: #eaf3de; border-color: #639922; color: #27500a; }
  .opt.wrong { background: #fcebeb; border-color: #a32d2d; color: #791f1f; }
  .opt.selected { border-width: 2.5px; }
  .opt:disabled { cursor: default; }
  .feedback { text-align: center; margin-top: 14px; padding: 12px; border-radius: 10px; }
  .feedback.correct { background: #eaf3de; color: #27500a; }
  .feedback.wrong { background: #fcebeb; color: #791f1f; }
  .feedback.timeout { background: #faeeda; color: #633806; }
  .feedback .pts { font-size: 22px; font-weight: 700; }
  .feedback .msg { font-size: 13px; margin-top: 2px; }
  .score-list { }
  .score-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .score-row:last-child { border: none; }
  .rank { font-size: 20px; min-width: 32px; }
  .sname { flex: 1; font-size: 15px; font-weight: 500; }
  .sname .detail { font-size: 12px; color: #888; font-weight: 400; }
  .spts { font-size: 15px; font-weight: 700; color: #1a1a1a; }
  .winner-banner { text-align: center; padding: 1.5rem; background: #faeeda; border-radius: 14px; margin-bottom: 12px; }
  .winner-banner .trophy { font-size: 48px; }
  .winner-banner .wname { font-size: 22px; font-weight: 700; margin-top: 8px; }
  .winner-banner .wsub { font-size: 14px; color: #633806; margin-top: 4px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat { background: #f5f5f0; border-radius: 10px; padding: 12px 14px; }
  .stat .val { font-size: 24px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: #888; margin-top: 2px; }
  .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #1d9e75; animation: pulse 1.2s infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.25} }
  .divider { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
  .error-msg { color: #c0392b; font-size: 13px; text-align: center; margin-bottom: 8px; min-height: 20px; }
  .label { font-size: 13px; color: #666; margin-bottom: 4px; display: block; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .slider-row input { flex: 1; margin: 0; }
  .slider-val { font-size: 14px; font-weight: 600; min-width: 28px; }
  .qr-wrap { text-align: center; margin: 12px 0; }
  .qr-wrap img { border-radius: 8px; border: 1px solid #eee; }
  .url-box { background: #f5f5f0; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #555; word-break: break-all; margin: 8px 0; font-family: monospace; }
  .copy-btn { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; margin-left: 6px; }
  .copy-btn:hover { background: #f5f5f0; }
  @media (max-width: 400px) { .options { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="logo">
      <div class="icon">⚡</div>
      <h1>Speed Quiz</h1>
      <p>Answer fast, score big</p>
    </div>
    <div class="card">
      <label class="label">Your name</label>
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" />
      <button class="btn btn-primary" onclick="goHost()">Host a new quiz</button>
      <div style="display:flex;align-items:center;gap:8px;margin:4px 0 10px">
        <div style="flex:1;height:1px;background:#eee"></div>
        <span style="font-size:12px;color:#aaa">or join existing</span>
        <div style="flex:1;height:1px;background:#eee"></div>
      </div>
      <label class="label">Room code</label>
      <input type="text" id="join-code" placeholder="e.g. QUIZ7" maxlength="6" style="text-transform:uppercase" />
      <button class="btn btn-secondary" onclick="goJoin()">Join room</button>
    </div>
    <div class="error-msg" id="home-err"></div>
  </div>

  <!-- HOST SETUP -->
  <div id="screen-setup" class="screen">
    <h2>Quiz settings</h2>
    <div class="card">
      <label class="label">Question set</label>
      <select id="q-set" onchange="onSetChange()">
        <option value="general">General knowledge</option>
        <option value="tech">Technology &amp; science</option>
        <option value="custom">Custom questions</option>
      </select>
      <div id="custom-area" style="display:none">
        <label class="label">Paste questions as JSON array</label>
        <textarea id="custom-json" rows="5" placeholder='[{"q":"Question?","options":["A","B","C","D"],"answer":0}]'></textarea>
      </div>
      <label class="label">Seconds per question</label>
      <div class="slider-row">
        <input type="range" min="10" max="60" value="20" step="5" id="time-slider" oninput="document.getElementById('time-val').textContent=this.value+'s'" />
        <span class="slider-val" id="time-val">20s</span>
      </div>
      <label class="label">Number of questions</label>
      <select id="q-count">
        <option value="5">5 questions</option>
        <option value="10" selected>10 questions</option>
        <option value="15">15 questions</option>
        <option value="20">20 questions</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="createRoom()">Create room</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-home')">Back</button>
    <div class="error-msg" id="setup-err"></div>
  </div>

  <!-- LOBBY -->
  <div id="screen-lobby" class="screen">
    <h2>Lobby</h2>
    <div class="card">
      <p style="font-size:12px;color:#888;margin-bottom:4px">Share this code with players</p>
      <div class="room-code" id="lobby-code"></div>
      <div class="qr-wrap" id="qr-wrap"></div>
      <div class="url-box" id="lobby-url"></div>
      <p style="font-size:13px;color:#888;margin-bottom:6px">Players in room</p>
      <div class="player-list" id="lobby-players"></div>
    </div>
    <div id="host-start" style="display:none">
      <button class="btn btn-primary" onclick="startQuiz()">Start quiz</button>
    </div>
    <div id="guest-wait" style="display:none">
      <p style="font-size:14px;color:#555"><span class="pulse"></span>Waiting for host to start…</p>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="screen-question" class="screen">
    <div class="q-meta">
      <span class="q-num" id="q-num">Question 1 of 10</span>
    </div>
    <div class="timer-wrap">
      <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
      <span class="timer-num" id="timer-num">20</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div id="feedback" style="display:none" class="feedback"></div>
  </div>

  <!-- BETWEEN -->
  <div id="screen-between" class="screen">
    <h2>Leaderboard</h2>
    <div class="card">
      <div class="score-list" id="between-list"></div>
    </div>
    <div id="host-next" style="display:none">
      <button class="btn btn-primary" id="next-btn" onclick="hostNext()">Next question</button>
    </div>
    <div id="guest-between-wait" style="display:none">
      <p style="font-size:14px;color:#555"><span class="pulse"></span>Waiting for host…</p>
    </div>
  </div>

  <!-- FINAL -->
  <div id="screen-final" class="screen">
    <div class="winner-banner" id="winner-banner"></div>
    <div class="card">
      <h3>Final leaderboard</h3>
      <div class="score-list" id="final-list"></div>
    </div>
    <hr class="divider" />
    <h3 style="margin-bottom:10px">Your stats</h3>
    <div class="stats-grid" id="my-stats"></div>
    <button class="btn btn-primary" onclick="playAgain()">Play again</button>
    <button class="btn btn-secondary" onclick="leaveRoom()">Back to home</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, off, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzgFUiLlHlOI5nBg5Nw_POPu43AcjzKIQ",
  authDomain: "babyshower-3a1a4.firebaseapp.com",
  databaseURL: "https://babyshower-3a1a4-default-rtdb.firebaseio.com",
  projectId: "babyshower-3a1a4",
  storageBucket: "babyshower-3a1a4.firebasestorage.app",
  messagingSenderId: "773217857715",
  appId: "1:773217857715:web:ac4a57b51a10fcf9e140c6",
  measurementId: "G-QP44M7WVM4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const QUESTION_SETS = {
  general: [
    {q:"What is the capital of Australia?",options:["Sydney","Melbourne","Canberra","Brisbane"],answer:2},
    {q:"How many sides does a hexagon have?",options:["5","6","7","8"],answer:1},
    {q:"Which planet is known as the Red Planet?",options:["Venus","Jupiter","Mars","Saturn"],answer:2},
    {q:"Who wrote Romeo and Juliet?",options:["Charles Dickens","William Shakespeare","Jane Austen","Homer"],answer:1},
    {q:"What is the chemical symbol for water?",options:["H2O","CO2","NaCl","O2"],answer:0},
    {q:"In which year did World War II end?",options:["1943","1944","1945","1946"],answer:2},
    {q:"What is the largest ocean on Earth?",options:["Atlantic","Indian","Arctic","Pacific"],answer:3},
    {q:"How many bones are in the adult human body?",options:["196","206","216","226"],answer:1},
    {q:"What language is spoken in Brazil?",options:["Spanish","Portuguese","French","English"],answer:1},
    {q:"Who painted the Mona Lisa?",options:["Michelangelo","Raphael","Leonardo da Vinci","Van Gogh"],answer:2},
    {q:"What is the smallest prime number?",options:["0","1","2","3"],answer:2},
    {q:"Which country invented paper?",options:["Egypt","China","India","Greece"],answer:1},
    {q:"How many continents are there?",options:["5","6","7","8"],answer:2},
    {q:"What is the approximate speed of light?",options:["300,000 km/s","150,000 km/s","500,000 km/s","250,000 km/s"],answer:0},
    {q:"Which element has the symbol Au?",options:["Silver","Copper","Gold","Iron"],answer:2},
    {q:"What is the longest river in the world?",options:["Amazon","Yangtze","Mississippi","Nile"],answer:3},
    {q:"How many planets are in our solar system?",options:["7","8","9","10"],answer:1},
    {q:"What gas do plants absorb from the atmosphere?",options:["Oxygen","Nitrogen","Carbon dioxide","Hydrogen"],answer:2},
    {q:"Who was the first person to walk on the moon?",options:["Buzz Aldrin","Yuri Gagarin","Neil Armstrong","John Glenn"],answer:2},
    {q:"What is the hardest natural substance on Earth?",options:["Gold","Iron","Diamond","Quartz"],answer:2},
  ],
  tech: [
    {q:"Who co-founded Apple with Steve Jobs?",options:["Bill Gates","Steve Wozniak","Elon Musk","Jeff Bezos"],answer:1},
    {q:"What does HTML stand for?",options:["HyperText Markup Language","HighText Machine Language","HyperText Machine Learning","HyperTransfer Markup Language"],answer:0},
    {q:"What year was the World Wide Web invented?",options:["1983","1989","1995","1999"],answer:1},
    {q:"Which company developed the Android OS?",options:["Apple","Microsoft","Google","Samsung"],answer:2},
    {q:"What is the binary representation of decimal 10?",options:["1000","1010","1100","1001"],answer:1},
    {q:"What does CPU stand for?",options:["Central Processing Unit","Core Processing Utility","Computer Power Unit","Central Program Utility"],answer:0},
    {q:"Which language is most associated with data science?",options:["Java","C++","Python","Ruby"],answer:2},
    {q:"What does AI stand for?",options:["Automated Intelligence","Artificial Intelligence","Advanced Integration","Algorithmic Interface"],answer:1},
    {q:"Which protocol is used to send emails?",options:["HTTP","FTP","SMTP","TCP"],answer:2},
    {q:"How many bits are in a byte?",options:["4","8","16","32"],answer:1},
    {q:"Git was created by which developer?",options:["James Gosling","Guido van Rossum","Linus Torvalds","Brendan Eich"],answer:2},
    {q:"What does URL stand for?",options:["Uniform Resource Locator","Universal Record Link","Unified Reference List","User Resource Location"],answer:0},
    {q:"Which company makes the Xbox?",options:["Sony","Nintendo","Microsoft","Sega"],answer:2},
    {q:"What does RAM stand for?",options:["Read Access Memory","Random Access Memory","Rapid Access Module","Read And Modify"],answer:1},
    {q:"What programming language runs in the browser?",options:["Python","Java","JavaScript","Ruby"],answer:2},
    {q:"What does IoT stand for?",options:["Internet of Things","Integration of Technology","Interface of Tools","Internet of Transfer"],answer:0},
    {q:"Which company owns YouTube?",options:["Meta","Amazon","Apple","Google"],answer:3},
    {q:"What is the most widely used operating system?",options:["macOS","Linux","Windows","Android"],answer:2},
    {q:"What does VPN stand for?",options:["Virtual Private Network","Visual Processing Node","Verified Proxy Network","Virtual Public Node"],answer:0},
    {q:"Which language is used for styling web pages?",options:["HTML","JavaScript","CSS","Python"],answer:2},
  ]
};

let G = {
  playerName: '',
  roomCode: '',
  isHost: false,
  timeLimit: 20,
  questions: [],
  currentQ: 0,
  answered: false,
  timerInterval: null,
  timerLeft: 0,
  answerStart: 0,
  listeners: []
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
window.showScreen = showScreen;

function err(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; setTimeout(() => el.textContent = '', 3000); }
}

function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5}, () => c[Math.floor(Math.random()*c.length)]).join('');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

window.onSetChange = function() {
  document.getElementById('custom-area').style.display =
    document.getElementById('q-set').value === 'custom' ? 'block' : 'none';
};

window.goHost = function() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { err('home-err', 'Please enter your name'); return; }
  G.playerName = name;
  showScreen('screen-setup');
};

window.goJoin = function() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { err('home-err', 'Please enter your name'); return; }
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) { err('home-err', 'Enter a room code'); return; }
  G.playerName = name;
  G.roomCode = code;
  G.isHost = false;
  joinRoom(code, name);
};

async function joinRoom(code, name) {
  const roomRef = ref(db, `rooms/${code}`);
  const snap = await get(roomRef);
  if (!snap.exists()) { err('home-err', 'Room not found — check the code'); return; }
  const room = snap.val();
  if (room.status === 'playing') { err('home-err', 'Quiz already in progress'); return; }
  await set(ref(db, `rooms/${code}/players/${name}`), { score: 0, correct: 0, total: 0, avgTime: 0, joined: Date.now() });
  G.timeLimit = room.timeLimit;
  G.questions = room.questions;
  renderLobby(code, false);
  showScreen('screen-lobby');
  listenForStart(code);
}

window.createRoom = async function() {
  const qSetVal = document.getElementById('q-set').value;
  let pool;
  if (qSetVal === 'custom') {
    try { pool = JSON.parse(document.getElementById('custom-json').value); if (!pool[0].q) throw 0; }
    catch { err('setup-err','Invalid JSON — check format'); return; }
  } else {
    pool = shuffle(QUESTION_SETS[qSetVal]);
  }
  const maxQ = parseInt(document.getElementById('q-count').value);
  const questions = pool.slice(0, maxQ);
  const timeLimit = parseInt(document.getElementById('time-slider').value);
  const code = genCode();
  G.roomCode = code;
  G.isHost = true;
  G.timeLimit = timeLimit;
  G.questions = questions;
  G.currentQ = 0;
  await set(ref(db, `rooms/${code}`), {
    status: 'lobby',
    timeLimit,
    questions,
    currentQ: 0,
    phase: 'lobby',
    host: G.playerName,
    created: Date.now()
  });
  await set(ref(db, `rooms/${code}/players/${G.playerName}`), { score:0, correct:0, total:0, avgTime:0, joined:Date.now() });
  renderLobby(code, true);
  showScreen('screen-lobby');
  listenLobbyPlayers(code);
};

function renderLobby(code, isHost) {
  document.getElementById('lobby-code').textContent = code;
  document.getElementById('host-start').style.display = isHost ? 'block' : 'none';
  document.getElementById('guest-wait').style.display = isHost ? 'none' : 'block';
  const url = window.location.href.split('?')[0] + '?room=' + code;
  document.getElementById('lobby-url').textContent = url;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}`;
  document.getElementById('qr-wrap').innerHTML = `<img src="${qrUrl}" width="160" height="160" alt="QR code to join quiz" /><p style="font-size:12px;color:#888;margin-top:6px">Scan to join on mobile</p>`;
}

function listenLobbyPlayers(code) {
  const r = ref(db, `rooms/${code}/players`);
  const unsub = onValue(r, snap => {
    const players = snap.val() || {};
    const el = document.getElementById('lobby-players');
    el.innerHTML = '';
    Object.keys(players).forEach(name => {
      const chip = document.createElement('div');
      chip.className = 'player-chip' + (name === G.playerName && G.isHost ? ' host' : '');
      chip.textContent = name;
      el.appendChild(chip);
    });
  });
  G.listeners.push({ r, unsub });
}

function listenForStart(code) {
  listenLobbyPlayers(code);
  const r = ref(db, `rooms/${code}/status`);
  const unsub = onValue(r, async snap => {
    if (snap.val() === 'playing') {
      const roomSnap = await get(ref(db, `rooms/${code}`));
      const room = roomSnap.val();
      G.questions = room.questions;
      G.timeLimit = room.timeLimit;
      G.currentQ = room.currentQ || 0;
      clearListeners();
      loadQuestion();
      showScreen('screen-question');
      listenForPhase(code);
    }
  });
  G.listeners.push({ r, unsub });
}

function clearListeners() {
  G.listeners.forEach(({ r, unsub }) => { try { off(r); } catch(e){} });
  G.listeners = [];
}

window.startQuiz = async function() {
  await update(ref(db, `rooms/${G.roomCode}`), { status: 'playing', currentQ: 0, phase: 'question' });
  loadQuestion();
  showScreen('screen-question');
  listenForPhase(G.roomCode);
};

function listenForPhase(code) {
  const r = ref(db, `rooms/${code}`);
  const unsub = onValue(r, snap => {
    if (!snap.exists()) return;
    const room = snap.val();
    if (G.isHost) return;
    const newQ = room.currentQ || 0;
    const phase = room.phase;
    if (phase === 'question' && newQ !== G.currentQ) {
      G.currentQ = newQ;
      G.questions = room.questions;
      clearInterval(G.timerInterval);
      loadQuestion();
      showScreen('screen-question');
    } else if (phase === 'between' && document.getElementById('screen-question').classList.contains('active')) {
      showBetween();
    } else if (phase === 'final') {
      clearListeners();
      showFinal();
    }
  });
  G.listeners.push({ r, unsub });
}

function loadQuestion() {
  const q = G.questions[G.currentQ];
  G.answered = false;
  document.getElementById('q-num').textContent = `Question ${G.currentQ+1} of ${G.questions.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').style.display = 'none';
  const grid = document.getElementById('options');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, btn);
    grid.appendChild(btn);
  });
  startTimer();
}

function startTimer() {
  clearInterval(G.timerInterval);
  G.timerLeft = G.timeLimit;
  G.answerStart = Date.now();
  updateTimer();
  G.timerInterval = setInterval(() => {
    G.timerLeft -= 0.1;
    if (G.timerLeft <= 0) {
      G.timerLeft = 0;
      clearInterval(G.timerInterval);
      if (!G.answered) timeUp();
    }
    updateTimer();
  }, 100);
}

function updateTimer() {
  const pct = Math.max(0, (G.timerLeft / G.timeLimit) * 100);
  const fill = document.getElementById('timer-fill');
  document.getElementById('timer-num').textContent = Math.ceil(G.timerLeft);
  fill.style.width = pct + '%';
  fill.className = 'timer-fill' + (pct < 25 ? ' danger' : pct < 50 ? ' warn' : '');
}

async function selectAnswer(idx, btn) {
  if (G.answered) return;
  G.answered = true;
  clearInterval(G.timerInterval);
  const elapsed = Math.min((Date.now() - G.answerStart) / 1000, G.timeLimit);
  const q = G.questions[G.currentQ];
  const correct = idx === q.answer;
  const pts = correct ? 200 + Math.round((1 - elapsed/G.timeLimit) * 800) : 0;
  document.querySelectorAll('.opt').forEach((b,i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === idx && !correct) b.classList.add('wrong');
  });
  btn.classList.add('selected');
  await recordAnswer(pts, correct, elapsed);
  showFeedback(correct, pts, elapsed, q.options[q.answer]);
  if (G.isHost) setTimeout(() => showBetween(), 2000);
}

async function timeUp() {
  G.answered = true;
  const q = G.questions[G.currentQ];
  document.querySelectorAll('.opt').forEach((b,i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
  });
  await recordAnswer(0, false, G.timeLimit);
  showFeedback('timeout', 0, G.timeLimit, q.options[q.answer]);
  if (G.isHost) setTimeout(() => showBetween(), 2000);
}

async function recordAnswer(pts, correct, time) {
  const pRef = ref(db, `rooms/${G.roomCode}/players/${G.playerName}`);
  const snap = await get(pRef);
  const cur = snap.val() || { score:0, correct:0, total:0, avgTime:0 };
  const newTotal = cur.total + 1;
  const newAvg = ((cur.avgTime * cur.total) + time) / newTotal;
  await update(pRef, {
    score: cur.score + pts,
    correct: cur.correct + (correct ? 1 : 0),
    total: newTotal,
    avgTime: Math.round(newAvg * 10) / 10
  });
}

function showFeedback(correct, pts, time, correctAns) {
  const el = document.getElementById('feedback');
  el.style.display = 'block';
  if (correct === 'timeout') {
    el.className = 'feedback timeout';
    el.innerHTML = `<div style="font-size:20px">⏱ Time's up!</div><div class="msg">Correct answer: <strong>${correctAns}</strong></div>`;
  } else if (correct) {
    el.className = 'feedback correct';
    el.innerHTML = `<div class="pts">+${pts} pts</div><div class="msg">Correct! Answered in ${time.toFixed(1)}s</div>`;
  } else {
    el.className = 'feedback wrong';
    el.innerHTML = `<div style="font-size:20px">✗ Wrong</div><div class="msg">Correct answer: <strong>${correctAns}</strong></div>`;
  }
}

async function showBetween() {
  const snap = await get(ref(db, `rooms/${G.roomCode}/players`));
  const players = snap.val() || {};
  const sorted = Object.entries(players).sort((a,b) => b[1].score - a[1].score);
  const list = document.getElementById('between-list');
  list.innerHTML = '';
  sorted.forEach(([name, data], i) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    row.innerHTML = `<span class="rank">${medal}</span><span class="sname">${name}${name===G.playerName?' <span style="color:#888;font-weight:400">(you)</span>':''}</span><span class="spts">${data.score} pts</span>`;
    list.appendChild(row);
  });
  const isLast = G.currentQ >= G.questions.length - 1;
  document.getElementById('host-next').style.display = G.isHost ? 'block' : 'none';
  document.getElementById('guest-between-wait').style.display = G.isHost ? 'none' : 'block';
  if (G.isHost) {
    const btn = document.getElementById('next-btn');
    btn.textContent = isLast ? 'See final results' : 'Next question';
    if (isLast) btn.onclick = async () => {
      await update(ref(db, `rooms/${G.roomCode}`), { phase: 'final' });
      showFinal();
    };
    await update(ref(db, `rooms/${G.roomCode}`), { phase: 'between' });
  }
  showScreen('screen-between');
}

window.hostNext = async function() {
  G.currentQ++;
  await update(ref(db, `rooms/${G.roomCode}`), { currentQ: G.currentQ, phase: 'question' });
  loadQuestion();
  showScreen('screen-question');
};

async function showFinal() {
  clearListeners();
  const snap = await get(ref(db, `rooms/${G.roomCode}/players`));
  const players = snap.val() || {};
  const sorted = Object.entries(players).sort((a,b) => b[1].score - a[1].score);
  const winner = sorted[0];
  const banner = document.getElementById('winner-banner');
  if (winner[0] === G.playerName) {
    banner.innerHTML = `<div class="trophy">🏆</div><div class="wname">You won!</div><div class="wsub">First place with ${winner[1].score} points</div>`;
  } else {
    banner.innerHTML = `<div class="trophy">🎉</div><div class="wname">${winner[0]} wins!</div><div class="wsub">With ${winner[1].score} points</div>`;
  }
  const list = document.getElementById('final-list');
  list.innerHTML = '';
  sorted.forEach(([name, data], i) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    row.innerHTML = `<span class="rank">${medal}</span><span class="sname">${name}${name===G.playerName?' <span style="color:#888;font-weight:400">(you)</span>':''}<br><span class="detail">${data.correct}/${data.total} correct</span></span><span class="spts">${data.score} pts</span>`;
    list.appendChild(row);
  });
  const me = players[G.playerName] || {};
  const myRank = sorted.findIndex(([n])=>n===G.playerName)+1;
  document.getElementById('my-stats').innerHTML = `
    <div class="stat"><div class="val">${me.score||0}</div><div class="lbl">Total points</div></div>
    <div class="stat"><div class="val">${me.correct||0}/${me.total||0}</div><div class="lbl">Correct answers</div></div>
    <div class="stat"><div class="val">${me.avgTime||0}s</div><div class="lbl">Avg response time</div></div>
    <div class="stat"><div class="val">#${myRank}</div><div class="lbl">Final rank</div></div>
  `;
  showScreen('screen-final');
}

window.playAgain = function() {
  if (G.isHost) showScreen('screen-setup');
  else showScreen('screen-home');
};

window.leaveRoom = function() {
  clearListeners();
  clearInterval(G.timerInterval);
  G = { playerName:'', roomCode:'', isHost:false, timeLimit:20, questions:[], currentQ:0, answered:false, timerInterval:null, timerLeft:0, answerStart:0, listeners:[] };
  showScreen('screen-home');
};

// Auto-join from URL param
const urlParams = new URLSearchParams(window.location.search);
const roomParam = urlParams.get('room');
if (roomParam) {
  document.getElementById('join-code').value = roomParam;
}
</script>
